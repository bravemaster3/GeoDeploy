server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Vite build assets are content-hashed (e.g. index-DD36mt6x.js) → their contents never change,
  # so cache them hard.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html and SPA route fallbacks must NOT be cached: after a rebuild the asset hashes change,
  # and a browser that cached index.html would keep loading the OLD bundle (looked like the page
  # was "stuck" / features not updating until a manual hard-refresh).
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}

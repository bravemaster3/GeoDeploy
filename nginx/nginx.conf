worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript;

    # Rate limiting for upload endpoints
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;

    server {
        listen 80;
        server_name _;

        client_max_body_size 11G;

        # Docker's internal DNS — resolves service names at request time so nginx
        # automatically finds recreated containers without needing a restart
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $api "geodeploy-api:8000";
        set $ui  "geodeploy-ui:80";

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check (exposed without /api prefix for the installer)
        location = /health {
            proxy_pass http://$api;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass         http://$api;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;

            location /api/data/vector/upload {
                limit_req zone=upload burst=3 nodelay;
                proxy_pass http://$api;
                proxy_read_timeout 600s;
            }
            location /api/data/raster/upload {
                limit_req zone=upload burst=3 nodelay;
                proxy_pass http://$api;
                proxy_read_timeout 600s;
            }
        }

        location /tiles/ {
            set $martin martin:3000;
            proxy_pass         http://$martin;
            proxy_set_header   Host $host;
            add_header         Access-Control-Allow-Origin *;
            add_header         Cache-Control "public, max-age=3600";
        }

        location /raster/ {
            set $titiler titiler:80;
            proxy_pass         http://$titiler;
            proxy_set_header   Host $host;
            add_header         Access-Control-Allow-Origin *;
            add_header         Cache-Control "public, max-age=3600";
        }

        location /portals/ {
            alias /var/www/portals/;
            try_files $uri $uri/ $uri/index.html =404;
            add_header Cache-Control "no-cache";
        }

        location /templates-static/ {
            proxy_pass http://$api;
        }

        location / {
            proxy_pass         http://$ui;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }

    # HTTPS server (activate after cert provisioning)
    # server {
    #     listen 443 ssl;
    #     server_name your-domain.com;
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     ... same locations as above ...
    # }
}

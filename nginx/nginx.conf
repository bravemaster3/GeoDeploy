worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript;

    # Rate limiting for upload endpoints
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;
    # Rate limiting for auth — throttles password brute-force against /api/auth/login.
    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

    server {
        listen 80;
        server_name _;
        merge_slashes off;

        client_max_body_size 11G;

        # Baseline security headers on every response ('always' = include on errors too).
        # nosniff + a conservative referrer policy are safe for all content types; they don't
        # affect the tile/raster/s3 binary proxies. Clickjacking (X-Frame-Options) is set only on
        # the app/API below — NOT here — so published portals stay embeddable in third-party pages.
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Docker's internal DNS — resolves service names at request time so nginx
        # automatically finds recreated containers without needing a restart
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $api "geodeploy-api:8000";
        set $ui  "geodeploy-ui:80";

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check (exposed without /api prefix for the installer)
        location = /health {
            proxy_pass http://$api;
            proxy_set_header Host $host;
        }

        location /api/ {
            proxy_pass         http://$api;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;

            # Throttle password guessing. burst=5 absorbs a legit retry/typo; sustained attempts
            # beyond 10/min get 429. Inherits the parent proxy_set_header directives.
            location = /api/auth/login {
                limit_req zone=login burst=5 nodelay;
                proxy_pass http://$api;
            }
            location /api/data/vector/upload {
                limit_req zone=upload burst=3 nodelay;
                proxy_pass http://$api;
                proxy_read_timeout 600s;
            }
            location /api/data/raster/upload {
                limit_req zone=upload burst=3 nodelay;
                proxy_pass http://$api;
                proxy_read_timeout 600s;
            }
        }

        location /tiles/ {
            set $martin martin:3000;
            rewrite ^/tiles/(.*)$ /$1 break;
            # Build the upstream URI explicitly: with a variable host, nginx does
            # not reliably forward the rewritten path + query args otherwise.
            proxy_pass         http://$martin$uri$is_args$args;
            proxy_set_header   Host $host;
            add_header         Access-Control-Allow-Origin *;
            add_header         Cache-Control "public, max-age=3600";
        }

        location /raster/ {
            set $titiler titiler:80;
            rewrite ^/raster/(.*)$ /$1 break;
            # Explicit upstream URI so the ?url=s3://... query reaches TiTiler intact.
            proxy_pass         http://$titiler$uri$is_args$args;
            proxy_set_header   Host $host;
            add_header         Access-Control-Allow-Origin *;
            add_header         Cache-Control "public, max-age=3600";
        }

        # Same-origin proxy to the local MinIO for presigned direct uploads (GeoParquet etc.).
        # The browser can't resolve the internal hostname, so it PUTs to /s3/... here. The
        # presigned URL is signed against geodeploy-minio:9000, so we MUST forward that exact
        # Host for SigV4 to verify. request buffering off → the 10 GB body streams straight to
        # MinIO instead of being spooled to nginx's disk first.
        location /s3/ {
            set $minio "geodeploy-minio:9000";
            rewrite ^/s3/(.*)$ /$1 break;
            proxy_pass             http://$minio$uri$is_args$args;
            proxy_set_header       Host geodeploy-minio:9000;
            proxy_request_buffering off;
            proxy_read_timeout     600s;
            proxy_send_timeout     600s;
            client_max_body_size   11G;
        }

        # Published portals are static bundles in /var/www/portals/{slug}/index.html.
        # The dashboard SPA ALSO uses /portals/... routes (e.g. /portals/3/edit), so if
        # the path isn't a published portal file, fall back to the SPA (@spa) instead of 404.
        location /portals/ {
            root /var/www;
            try_files $uri $uri/index.html @spa;
            add_header Cache-Control "no-cache";
        }

        location /templates-static/ {
            proxy_pass http://$api;
        }

        # SPA fallback — the UI container serves index.html for any unknown route.
        # The admin dashboard must NOT be framable (clickjacking on admin actions), so it carries
        # X-Frame-Options here. A location that sets add_header does NOT inherit the server-level
        # ones, so the two baseline headers are repeated.
        location @spa {
            proxy_pass         http://$ui;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            add_header X-Content-Type-Options nosniff always;
            add_header Referrer-Policy strict-origin-when-cross-origin always;
            add_header X-Frame-Options SAMEORIGIN always;
        }

        location / {
            proxy_pass         http://$ui;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            add_header X-Content-Type-Options nosniff always;
            add_header Referrer-Policy strict-origin-when-cross-origin always;
            add_header X-Frame-Options SAMEORIGIN always;
        }
    }

    # ── HTTPS ──────────────────────────────────────────────────────────────────
    # Tokens are bearer JWTs, so run behind TLS in production. After provisioning a cert
    # (certbot uses the /.well-known/acme-challenge/ location above), uncomment this block,
    # set your domain, and redirect HTTP→HTTPS by replacing the `location /` in the :80 server
    # with `return 301 https://$host$request_uri;` (keep the ACME challenge location on :80).
    # server {
    #     listen 443 ssl;
    #     http2 on;
    #     server_name your-domain.com;
    #     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache   shared:SSL:10m;
    #     # Tell browsers to only ever use HTTPS for this site (2 years).
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    #     add_header X-Content-Type-Options nosniff always;
    #     add_header Referrer-Policy strict-origin-when-cross-origin always;
    #     client_max_body_size 11G;
    #     merge_slashes off;
    #     resolver 127.0.0.11 valid=30s ipv6=off;
    #     # ... copy every location {} from the :80 server above (api, tiles, raster, s3, portals, spa) ...
    # }
}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: api
        # No system GDAL/libpq needed: psycopg2-binary, rasterio and fiona ship self-contained
        # manylinux wheels. (Installing libgdal-dev pulled a liblzma-dev version that 404s on the
        # runner mirror — see git history.)
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: api
        run: pytest tests/ -v --tb=short
        env:
          GEODEPLOY_ENV: development
          GEODEPLOY_SECRET_KEY: test-secret-key
          GEODEPLOY_DATA_DIR: /tmp/geodeploy-test

  ui:
    name: UI build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: ui
        run: npm install

      - name: Build
        working-directory: ui
        run: npm run build

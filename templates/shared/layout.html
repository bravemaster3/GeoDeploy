<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <!-- PMTiles protocol (GeoParquet layers render from a .pmtiles archive) -->
  <script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>
  <!-- Shared GeoDeploy portal runtime (same for every template) -->
  <style>{{PORTAL_CSS}}</style>
  <!-- Template theme: override CSS variables / fonts here -->
  <style>{{THEME_CSS}}</style>
</head>
<body>
<!-- Access gate — shown by JS when ACCESS_TYPE != 'public' -->
<div id="access-gate" style="display:none">
  <div id="access-gate-box">
    <div id="access-gate-title">{{TITLE}}</div>
    <div id="access-gate-sub" id="access-gate-sub"></div>
    <input id="access-gate-input" type="password" placeholder="Enter password" autocomplete="current-password" />
    <button id="access-gate-btn">Continue</button>
    <div id="access-gate-error"></div>
  </div>
</div>

<header id="header">
  <button id="sidebar-toggle" aria-label="Toggle layers panel" title="Layers">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linejoin="round" stroke-linecap="round">
      <polygon points="12 2 2 7 12 12 22 7 12 2"/>
      <polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
    </svg>
  </button>
  <span id="portal-title">{{TITLE}}</span>
  <span id="header-badge">
    <a href="https://geodeploy.io" target="_blank" rel="noopener">GeoDeploy</a>
  </span>
</header>

<div id="layout">
  <aside id="sidebar">
    <div id="sidebar-inner">
      <p class="sidebar-section-title">Layers</p>
      <div id="layer-list"></div>
      <button id="reset-styling" type="button" style="display:none">↺ Reset styling</button>
    </div>
  </aside>
  <div id="map-wrap">
    <div id="map"></div>
    <div id="coords"></div>
    <div id="attr-panel">
      <div id="attr-panel-head">
        <span id="attr-panel-title">Attributes</span>
        <span id="attr-panel-count"></span>
        <button id="attr-panel-close" title="Close" aria-label="Close attribute table">&times;</button>
      </div>
      <div id="attr-panel-body"></div>
    </div>
  </div>
</div>

<!-- Portal data injected at publish time -->
<script>
window.GEODEPLOY = {
  title: "{{TITLE}}",
  slug: "{{SLUG}}",
  style: {{STYLE_JSON}},
  popupConfig: {{POPUP_CONFIG}},
  accessType: "{{ACCESS_TYPE}}",
  passwordSha256: "{{PASSWORD_SHA256}}"
};
</script>
<script>{{PORTAL_JS}}</script>
</body>
</html>

services:
  geodeploy-api:
    build: ./api
    image: geodeploy/api:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/sqlite:/data/sqlite
      - ./data/portals:/data/portals
      - ./data/temp:/data/temp
      - ./data/martin:/data/martin
      - ./templates:/templates:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - geodeploy
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  geodeploy-ui:
    build: ./ui
    image: geodeploy/ui:latest
    restart: unless-stopped
    networks:
      - geodeploy
    depends_on:
      - geodeploy-api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/portals:/var/www/portals:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
    networks:
      - geodeploy
    depends_on:
      - geodeploy-api
      - geodeploy-ui

  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    profiles: ["local-db"]
    container_name: geodeploy-postgres
    environment:
      POSTGRES_DB: ${POSTGIS_DB:-geodeploy}
      POSTGRES_USER: ${POSTGIS_USER:-geodeploy}
      POSTGRES_PASSWORD: ${POSTGIS_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - geodeploy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGIS_USER:-geodeploy} -d ${POSTGIS_DB:-geodeploy}"]
      interval: 10s
      timeout: 5s
      retries: 10

  martin:
    image: ghcr.io/maplibre/martin:latest
    restart: unless-stopped
    profiles: ["postgis"]
    container_name: geodeploy-martin
    command: --config /config/martin-config.yaml
    volumes:
      - ./data/martin:/config
    networks:
      - geodeploy
    depends_on:
      postgres:
        condition: service_healthy

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    restart: unless-stopped
    profiles: ["raster"]
    container_name: geodeploy-titiler
    environment:
      AWS_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${STORAGE_SECRET_KEY}
      AWS_S3_ENDPOINT: ${STORAGE_ENDPOINT}
      AWS_HTTPS: "NO"
      AWS_VIRTUAL_HOSTING: "FALSE"
      GDAL_DISABLE_READDIR_ON_OPEN: EMPTY_DIR
      CPL_VSIL_CURL_ALLOWED_EXTENSIONS: .tif,.tiff
      WORKERS_PER_CORE: "1"
    networks:
      - geodeploy

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    profiles: ["local-storage"]
    container_name: geodeploy-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY}
    volumes:
      - ./data/minio:/data
    networks:
      - geodeploy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    container_name: geodeploy-redis
    volumes:
      - ./data/redis:/data
    networks:
      - geodeploy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery:
    build: ./api
    image: geodeploy/api:latest
    restart: unless-stopped
    command: celery -A geodeploy.celery_app worker --loglevel=info --concurrency=2 -Q ingest
    env_file: .env
    volumes:
      - ./data/sqlite:/data/sqlite
      - ./data/temp:/data/temp
      - ./data/martin:/data/martin
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - geodeploy
    depends_on:
      redis:
        condition: service_healthy

networks:
  geodeploy:
    name: geodeploy
    external: true
